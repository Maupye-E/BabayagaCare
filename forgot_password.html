<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - Babayaga Care</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="login-container">
      <h2 class="text-center">🔐 Reset Your Password</h2>

      <div id="messageBox" class="message hidden"></div>

      <form
        id="forgotPasswordForm"
        onsubmit="return handleDemoForgotPassword(event);"
      >
        <div class="form-group">
          <label>📱 Phone Number</label>
          <input
            type="tel"
            id="forgotPhone"
            name="phone"
            required
            placeholder="Enter your phone number"
          />
        </div>
        <div class="form-group">
          <label>🔐 New Password</label>
          <input
            type="password"
            id="forgotNewPassword"
            name="newPassword"
            required
            placeholder="Min 6 characters"
          />
        </div>
        <div class="form-group">
          <label>🔐 Confirm Password</label>
          <input
            type="password"
            id="forgotConfirmPassword"
            name="confirmPassword"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary full-width">
          Reset Password
        </button>
      </form>
      <p class="text-center mt-20"><a href="login.html">← Back to Login</a></p>
      <p class="demo-note">
        📱 Demo Version | In the full app, passwords would be reset in the
        database
      </p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
