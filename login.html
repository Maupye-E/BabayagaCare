<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Babayaga Care</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="login-container">
      <h2 class="text-center">🧙‍♀️ Babayaga Care</h2>

      <div id="messageBox" class="message hidden"></div>

      <div class="tab-container">
        <button class="tab active" onclick="showPanel('login')">Login</button>
        <button class="tab" onclick="showPanel('register')">Register</button>
      </div>

      <!-- Login Panel -->
      <div id="loginPanel" class="form-panel active">
        <form id="loginForm" onsubmit="return handleDemoLogin(event);">
          <div class="form-group">
            <label>📱 Phone Number</label>
            <input
              type="tel"
              id="loginPhone"
              name="phone"
              placeholder="e.g., 0712345678"
              required
            />
          </div>
          <div class="form-group">
            <label>🔐 Password</label>
            <input
              type="password"
              id="loginPassword"
              name="password"
              placeholder="Enter your password"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary full-width">
            Login
          </button>
        </form>
        <div class="forgot-link">
          <a href="forgot_password.html">Forgot Password?</a>
        </div>
      </div>

      <!-- Register Panel -->
      <div id="registerPanel" class="form-panel">
        <form id="registerForm" onsubmit="return handleDemoRegister(event);">
          <div class="form-group">
            <label>👤 Full Name</label>
            <input
              type="text"
              id="regName"
              name="name"
              required
              placeholder="Thabo Nkosi"
            />
          </div>
          <div class="form-group">
            <label>📱 Phone Number</label>
            <input
              type="tel"
              id="regPhone"
              name="phone"
              required
              placeholder="0712345678"
            />
          </div>
          <div class="form-group">
            <label>🔐 Password</label>
            <input
              type="password"
              id="regPassword"
              name="password"
              required
              placeholder="Min 6 characters"
            />
          </div>
          <div class="form-group">
            <label>🔐 Confirm Password</label>
            <input
              type="password"
              id="regConfirmPassword"
              name="confirmPassword"
              required
              placeholder="Re-enter password"
            />
          </div>
          <div class="form-group">
            <label>🗣️ Preferred Language</label>
            <select id="regLanguage" name="language">
              <option value="English">English</option>
              <option value="isiZulu">isiZulu</option>
              <option value="Sesotho">Sesotho</option>
              <option value="Afrikaans">Afrikaans</option>
              <option value="isiXhosa">isiXhosa</option>
            </select>
          </div>
          <div class="form-group">
            <label>📍 Location</label>
            <input
              type="text"
              id="regLocation"
              name="location"
              placeholder="e.g., Soweto, Khayelitsha"
            />
          </div>
          <div class="form-group">
            <label>👥 Register as</label>
            <select id="regRole" name="role">
              <option value="patient">Patient (Need help)</option>
              <option value="volunteer">Volunteer (Want to help)</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary full-width">
            Register
          </button>
        </form>
      </div>

      <p class="demo-note">
        📱 Demo Version | Full app requires Java backend with database
      </p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
