<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - Admin</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="admin-container">
      <div class="admin-header">
        <h2>👑 Admin: Reset User Password</h2>
        <p>Welcome, Admin User!</p>
      </div>

      <div id="messageBox" class="message hidden"></div>

      <div class="user-list">
        <h3>📋 All Users</h3>
        <div id="userListContainer">
          <!-- Users will be populated by JavaScript -->
        </div>
      </div>

      <div id="selectedUserInfo" class="selected-user-info hidden">
        Resetting password for: <strong id="selectedUserName"></strong>
      </div>

      <form
        id="resetPasswordForm"
        onsubmit="return handleAdminResetPassword(event);"
      >
        <input type="hidden" id="selectedUserId" name="userId" />
        <div class="form-group">
          <label>🔐 New Password</label>
          <input
            type="password"
            id="adminNewPassword"
            name="newPassword"
            required
            placeholder="Min 6 characters"
          />
        </div>
        <div class="form-group">
          <label>🔐 Confirm Password</label>
          <input
            type="password"
            id="adminConfirmPassword"
            name="confirmPassword"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary full-width">
          Reset Password
        </button>
      </form>

      <div class="btn-back">
        <a href="admin_dashboard.html">← Back to Admin Dashboard</a>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
